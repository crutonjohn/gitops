---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: workstations
  annotations:
    external-dns/private: "true"
spec:
  endpoints:
    - dnsName: fabius.${FAMILY_DOMAIN}
      recordTTL: 0
      recordType: A
      targets:
        - 192.168.128.3
    - dnsName: jacob-desktop.${FAMILY_DOMAIN}
      recordTTL: 0
      recordType: A
      targets:
        - 192.168.128.4
    - dnsName: cawl.${FAMILY_DOMAIN}
      recordTTL: 0
      recordType: A
      targets:
        - 192.168.128.6
    - dnsName: wayward.${FAMILY_DOMAIN}
      recordTTL: 0
      recordType: A
      targets:
        - 192.168.128.8
