apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mealie-cors
spec:
  headers:
    accessControlAllowOriginList:
      - "https://home.${FAMILY_DOMAIN}"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - Authorization
      - Content-Type
    accessControlMaxAge: 100
    addVaryHeader: true
