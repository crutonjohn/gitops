---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 12h
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    defaultPodOptions:
      securityContext:
        runAsUser: ${APP_UID}
        runAsGroup: ${APP_UID}
        # supplementalGroups: [7575]
        fsGroup: ${APP_UID}
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      android-dav:
        annotations:
          secret.reloader.stakater.com/reload: android-dav-config

        containers:
          android-dav:
            image:
              repository: ghcr.io/hacdias/webdav
              tag: v5.11.9@sha256:2f04f5c86d743c99a8739b4e7007395ee314d8ea636816e960ab8f2483a43d25
            probes:
              liveness:
                enabled: false
                type: TCP
                spec:
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: false
                type: TCP
                spec:
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: false
                type: TCP
                spec:
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 5m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    ingress:
      android-dav:
        enabled: true
        annotations:
          opn.internal-dns.kubernetes.io/target: &target internal-ingress.${SECRET_DOMAIN}
          opn.internal-dns.kubernetes.io/hostname: &hostname ${INGRESSROUTE_SUBDOMAIN}.${FAMILY_DOMAIN}
          pi.internal-dns.kubernetes.io/target: *target
          pi.internal-dns.kubernetes.io/hostname: *hostname
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        labels: {}
        className: traefik-internal
        hosts:
          - host: *hostname
            paths:
              - path: /
                pathType: ImplementationSpecific
                service:
                  name: android-dav
                  port: 6065
        tls:
          - secretName: heyjohn-wildcard-certificate
            hosts:
              - *hostname

    service:
      android-dav:
        controller: android-dav
        primary: true
        ports:
          http:
            port: 6065

    persistence:
      data:
        existingClaim: android-dav-crutonjohn
        advancedMounts:
          android-dav:
            android-dav:
              - path: /data/crutonjohn
      config:
        type: secret
        name: android-dav-config
        advancedMounts:
          android-dav:
            android-dav:
              - path: /config.yml
                subPath: config.yml
