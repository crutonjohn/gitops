# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/common-3.1.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 12h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: fulgrim
    controllers:
      windrose:
        type: deployment

        containers:
          windrose:
            nameOverride: windrose
            image:
              repository: ghcr.io/uberdudepl/windrose-dedicated-server-docker
              tag: v1.1.14
            envFrom:
              - secretRef:
                  name: windrose-env
            env:
              TZ: ${LOCAL_TIMEZONE}
              # Host user id for mounted files
              PUID: ${APP_UID}
              # Host group id for mounted files
              PGID: ${APP_UID}
              # SteamCMD login
              STEAM_LOGIN: "anonymous"
              # Leave empty for anonymous login
              STEAM_PASS: ""
              # Steam AppID for Windrose Dedicated Server
              WINDROSE_APP_ID: "4129620"
              # Set false to skip update on container restart
              UPDATE_ON_START: "true"
              # Set false to skip env-based JSON patching
              GENERATE_SETTINGS: "true"
              # Optional invite code
              INVITE_CODE: ""
              # Optional server name
              SERVER_NAME: "RG_WINDROSE"
              # Optional public server note/description
              SERVER_NOTE: ""
              # Recommended for stability
              MAX_PLAYERS: "8"
              # Keep default unless you know you need a change
              P2P_PROXY_ADDRESS: "127.0.0.1"
              PORT: "7777"
              QUERYPORT: "7778"
              MULTIHOME: "0.0.0.0"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 4
                memory: 8Gi

    persistence:
      data:
        enabled: true
        existingClaim: "windrose-data"
        advancedMounts:
          windrose:
            windrose:
              - path: /data
                readOnly: false
      save:
        enabled: true
        existingClaim: "windrose-save"
        advancedMounts:
          windrose:
            windrose:
              - path: /data/R5/Saved/SaveProfiles
                readOnly: false

    ingress:
      windrose:
        enabled: false
        annotations:
          external-dns/public: "true"
          external-dns.alpha.kubernetes.io/hostname: ${INGRESSROUTE_SUBDOMAIN}.${FAMILY_DOMAIN}
          external-dns.alpha.kubernetes.io/target: ${DYNAMIC_DOMAIN},${CLUSTER_LB_INGRESS_EXTERNAL}
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        labels: {}
        className: traefik-external
        hosts:
          - host: ${INGRESSROUTE_SUBDOMAIN}.${FAMILY_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: ${APP}
                  port: 4533
        tls:
          - secretName: heyjohn-wildcard-certificate
            hosts:
              - ${INGRESSROUTE_SUBDOMAIN}.${FAMILY_DOMAIN}

    service:
      windrose:
        enabled: true
        controller: windrose
        primary: true
        #externalTrafficPolicy: Local
        annotations:
          external-dns.alpha.kubernetes.io/hostname: ${INGRESSROUTE_SUBDOMAIN}.${FAMILY_DOMAIN}
          external-dns.alpha.kubernetes.io/target: ${CLUSTER_LB_WINDROSE}
          io.cilium/lb-ipam-sharing-key: WINDROSE
          io.cilium/lb-ipam-ips: ${CLUSTER_LB_WINDROSE}
        labels:
          io.cilium/bgp-announce: worker
        ports:
          connect:
            port: 7777
            protocol: UDP
          query:
            port: 7778
            protocol: UDP
