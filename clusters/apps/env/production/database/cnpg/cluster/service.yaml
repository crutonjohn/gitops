---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  labels:
    io.cilium/bgp-announce: worker
  annotations:
    io.cilium/lb-ipam-ips: "${CLUSTER_LB_CNPG}"
spec:
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: postgres18
    cnpg.io/instanceRole: primary
---
apiVersion: v1
kind: Service
metadata:
  name: postgres16-rw
  namespace: database
spec:
  internalTrafficPolicy: Cluster
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: postgres18
    cnpg.io/instanceRole: primary
